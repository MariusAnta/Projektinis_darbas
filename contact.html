<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/contact.css" />
    <link rel="stylesheet" href="styles/Contact submit.css"/>
    <link href='https://fonts.googleapis.com/css?family=Livvic' rel='stylesheet'>
    <title>Contacts</title>
  </head>
  <body>
    <!--Header -  nav bar -->
    <header></header>
    <!-- Contact page -->
    <div class="cnttbl">
      <div class="cntsegment1">
          <p class="cnth1">Contact</p>
          <p class="cnth2">Ask us about</p>
          <ul class="cntul">
              <li>The quality of our talent network</li>
              <li>Usage & implementation of our software</li>
              <li>How we help drive innovation</li>
          </ul>
      </div>
      <div class="cntsegment2">
          <input type="text" name="name" id="name" class="cnttxt" placeholder="Name">
          <br>
          <input type="text" name="email" id="email" class="cnttxt" placeholder="Email Adress">
          <br>
          <input type="text" name="company" id="company" class="cnttxt" placeholder="Company Name">
          <br>
          <input type="text" name="title" id="title" class="cnttxt" placeholder="Title">
          <br>
          <input type="text" name="msg" id="msg" class="cnttxt" placeholder="Message">
          <br>
          <button class="cntbtn">submit</button>
      </div>
  </div>
    <!-- Footer -->
    <footer></footer>
  </body>
</html>
